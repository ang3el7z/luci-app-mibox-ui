name: Build And Release From Tag
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  sync-version:
    name: Sync Version To Branch
    runs-on: ubuntu-latest

    outputs:
      target_branch: ${{ steps.set-branch.outputs.target_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set target branch
        id: set-branch
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          echo "target_branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Using branch: $BRANCH"

      - name: Sync version from tag
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"

          sed -i "s/^PKG_VERSION:=.*$/PKG_VERSION:=${VERSION}/" luci-app-xkeen-ui/Makefile

          # если есть фронт
          if [ -f luci-app-xkeen-ui/htdocs/luci-static/resources/view/xkeen-ui/dashboard.js ]; then
            sed -i "s/^const APP_VERSION = '.*';/const APP_VERSION = '${VERSION}';/" \
              luci-app-xkeen-ui/htdocs/luci-static/resources/view/xkeen-ui/dashboard.js
          fi

      - name: Commit and push
        run: |
          set -e

          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "sync version with tag ${{ github.ref_name }}"
          git push origin HEAD:${{ steps.set-branch.outputs.target_branch }}

  build:
    name: Build (${{ matrix.pkg_format }})
    runs-on: ubuntu-latest
    needs: sync-version

    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg_format: ipk
            release_family: "24.10"
          - pkg_format: apk
            release_family: "25.12"

    steps:
      - name: Checkout synced branch
        uses: actions/checkout@v4
        with:
          ref: refs/heads/${{ needs.sync-version.outputs.target_branch }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd curl build-essential

      - name: Resolve SDK
        id: sdk
        run: |
          set -e

          FAMILY="${{ matrix.release_family }}"
          TARGET="x86"
          SUBTARGET="64"

          BASE="https://downloads.openwrt.org/releases"

          VERSION=$(curl -fsSL "$BASE/" \
            | grep -oE "${FAMILY}\.[0-9]+/" \
            | tr -d '/' \
            | sort -V \
            | tail -n1)

          SDK_URL=$(curl -fsSL "$BASE/$VERSION/targets/$TARGET/$SUBTARGET/" \
            | grep -oE 'openwrt-sdk-[^"]+\.tar\.(zst|xz|gz)' \
            | head -n1)

          FULL_URL="$BASE/$VERSION/targets/$TARGET/$SUBTARGET/$SDK_URL"

          echo "sdk_url=$FULL_URL" >> $GITHUB_OUTPUT

      - name: Download SDK
        run: |
          set -e

          mkdir sdk
          curl -L "${{ steps.sdk.outputs.sdk_url }}" -o sdk.tar

          case sdk.tar in
            *.zst) tar --zstd -xf sdk.tar -C sdk ;;
            *.xz)  tar -xJf sdk.tar -C sdk ;;
            *.gz)  tar -xzf sdk.tar -C sdk ;;
          esac

          SDK_DIR=$(find sdk -mindepth 1 -maxdepth 1 -type d | head -n1)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      - name: Build package
        run: |
          set -e

          cd "$SDK_DIR"

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          ln -s "$GITHUB_WORKSPACE/luci-app-xkeen-ui" package/

          make defconfig
          make package/luci-app-xkeen-ui/compile -j$(nproc) V=s

      - name: Collect artifact
        run: |
          set -e

          VERSION="${GITHUB_REF_NAME#v}"
          OUT=out
          mkdir -p $OUT

          find "$SDK_DIR/bin" -name "luci-app-xkeen-ui*.${{ matrix.pkg_format }}" \
            -exec cp {} "$OUT/luci-app-xkeen-ui-${VERSION}-all.${{ matrix.pkg_format }}" \;

          ls -la $OUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.pkg_format }}
          path: out/*.${{ matrix.pkg_format }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
