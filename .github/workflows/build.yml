name: Build And Release From Tag
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag (example: v0.1.0)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  sync-version:
    name: Sync Version To Branch
    runs-on: ubuntu-22.04

    outputs:
      target_branch: ${{ steps.branch.outputs.target_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set target branch
        id: branch
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          echo "target_branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release-tag }}" ]; then
            RAW="${{ github.event.inputs.release-tag }}"
          else
            RAW="${GITHUB_REF#refs/tags/}"
          fi

          VERSION="${RAW#v}"

          if [ -z "$VERSION" ]; then
            echo "Version empty"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version in files
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"

          sed -i -E "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" luci-app-mibox-ui/Makefile

          sed -i -E "s/^const APP_VERSION = '.*';/const APP_VERSION = '${VERSION}';/" \
            luci-app-mibox-ui/htdocs/luci-static/resources/view/mibox-ui/dashboard.js

      - name: Commit and push
        run: |
          set -e

          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "sync version with tag ${{ github.ref_name }}"
          git push origin HEAD:${{ steps.branch.outputs.target_branch }}

  build:
    name: Build (OpenWrt ${{ matrix.version }} / ${{ matrix.pkg_format }})
    runs-on: ubuntu-22.04
    needs: sync-version

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "24.10.2"
            pkg_format: "ipk"
            arch: "x86/64"
          - version: "25.12.0-rc2"
            pkg_format: "apk"
            arch: "x86/64"

    env:
      PACKAGE_NAME: luci-app-mibox-ui
      SDK_NAME: -sdk-
      SDK_URL_PATH: https://downloads.openwrt.org/releases/${{ matrix.version }}/targets/${{ matrix.arch }}

    steps:
      - name: Checkout synced branch
        uses: actions/checkout@v4
        with:
          ref: refs/heads/${{ needs.sync-version.outputs.target_branch }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -yq \
            build-essential \
            ca-certificates \
            gawk \
            gettext \
            libncurses5-dev \
            rsync \
            unzip \
            wget \
            xsltproc \
            zstd

      - name: Create temp dirs
        run: |
          echo "SDK_DL_DIR=$(mktemp -d)" >> "$GITHUB_ENV"
          echo "SDK_HOME=$(mktemp -d)" >> "$GITHUB_ENV"

      - name: Download SDK
        run: |
          set -e
          cd "$SDK_DL_DIR"

          wget -q -O sha256sums "$SDK_URL_PATH/sha256sums"

          grep -- "$SDK_NAME" sha256sums > sha256sums.small

          SDK_FILE="$(cut -d' ' -f2 < sha256sums.small | sed 's/*//g')"

          wget -q -O "$SDK_FILE" "$SDK_URL_PATH/$SDK_FILE"

          sha256sum -c ./sha256sums.small

          tar --zstd -xf "$SDK_FILE" -C "$SDK_HOME" --strip=1

      - name: Build package
        run: |
          set -e

          cd "$SDK_HOME"

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          ln -s "${{ github.workspace }}/luci-app-mibox-ui" "package/$PACKAGE_NAME"

          make defconfig
          make "package/$PACKAGE_NAME/compile" -j"$(nproc)" V=s

          OUT_DIR="${{ github.workspace }}/dist/${{ matrix.version }}-${{ matrix.pkg_format }}"
          mkdir -p "$OUT_DIR"

          find "$SDK_HOME/bin" -type f \
            \( -name "${PACKAGE_NAME}_*.${{ matrix.pkg_format }}" -o -name "${PACKAGE_NAME}-*.${{ matrix.pkg_format }}" \) \
            -exec cp -v {} "$OUT_DIR/" \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.version }}-${{ matrix.pkg_format }}
          path: dist/${{ matrix.version }}-${{ matrix.pkg_format }}/*.${{ matrix.pkg_format }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release
        id: prep
        run: |
          set -e

          mkdir -p release_files

          find artifacts -type f \( -name "*.ipk" -o -name "*.apk" \) \
            -exec cp -v {} release_files/ \;

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release-tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          case "$TAG" in
            v*) ;;
            *) TAG="v$TAG" ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag }}
          files: release_files/*
